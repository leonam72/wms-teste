comando: "brfiscalfaker --type NFCe"
descricao: "Gera um XML de Nota Fiscal de Consumidor Eletrônica (NFCe) fictícia."
uso_ia: "Use este comando para simular vendas ao consumidor final (modelo 65)."
parametros_opcionais:
  cpf: "--cpf [número]"
  cnpj: "--cnpj [número]"
  remover_tags: "--block-tags 'tag1, tag2'"
exemplo: "brfiscalfaker --type NFCe --cpf 12345678901"
