<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Unlock - Warehouse Layout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<!-- Background: Blurred Warehouse Layout -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 bg-slate-200/50 dark:bg-slate-900/50 backdrop-blur-md"></div>
<div class="grid grid-cols-12 gap-4 p-8 opacity-20 scale-110">
<!-- Mockup of warehouse racks/grid -->
<div class="col-span-2 h-64 bg-slate-400 dark:bg-slate-700 rounded-lg"></div>
<div class="col-span-2 h-64 bg-slate-400 dark:bg-slate-700 rounded-lg"></div>
<div class="col-span-2 h-64 bg-primary/40 rounded-lg border-2 border-primary"></div>
<div class="col-span-2 h-64 bg-slate-400 dark:bg-slate-700 rounded-lg"></div>
<div class="col-span-4 h-64 bg-slate-400 dark:bg-slate-700 rounded-lg"></div>
<div class="col-span-3 h-48 bg-slate-400 dark:bg-slate-700 rounded-lg"></div>
<div class="col-span-6 h-48 bg-slate-400 dark:bg-slate-700 rounded-lg"></div>
<div class="col-span-3 h-48 bg-slate-400 dark:bg-slate-700 rounded-lg"></div>
</div>
</div>
<!-- Main Content Wrapper -->
<div class="relative z-10 flex min-h-screen flex-col items-center justify-center p-4">
<!-- Modal Container -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700">
<!-- Header (TopNavBar Component Style) -->
<header class="flex items-center justify-between border-b border-slate-100 dark:border-slate-700 px-6 py-4">
<div class="flex items-center gap-3">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">admin_panel_settings</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Admin Unlock</h2>
</div>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Content Area -->
<div class="p-8 flex flex-col gap-6">
<div class="text-center">
<h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mb-2">Enter Admin Password to Edit Layout</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Secure access required to modify warehouse configuration</p>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Admin Password</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Keypad Grid (Optional Standard UI addition) -->
<div class="grid grid-cols-3 gap-3">
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">1</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">2</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">3</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">4</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">5</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">6</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">7</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">8</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">9</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">
<span class="material-symbols-outlined text-sm">backspace</span>
</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors">0</button>
<button class="h-12 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 font-semibold transition-colors text-primary">CLR</button>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">lock_open</span>
                    Unlock Edit Mode
                </button>
</div>
<!-- Tool Footer Preview (Simulated as Locked State) -->
<div class="bg-slate-50 dark:bg-slate-900/50 p-4 border-t border-slate-100 dark:border-slate-700 opacity-50 pointer-events-none">
<div class="flex justify-between items-center">
<div class="flex gap-2">
<div class="p-2 text-slate-400"><span class="material-symbols-outlined">drag_click</span></div>
<div class="p-2 text-slate-400"><span class="material-symbols-outlined">square</span></div>
<div class="p-2 text-slate-400"><span class="material-symbols-outlined">select_all</span></div>
<div class="p-2 text-slate-400"><span class="material-symbols-outlined">map</span></div>
</div>
<div class="bg-slate-200 dark:bg-slate-700 h-8 w-24 rounded-lg"></div>
</div>
</div>
</div>
<!-- Floating Hint -->
<div class="mt-8 flex items-center gap-2 px-4 py-2 bg-white/80 dark:bg-slate-800/80 backdrop-blur rounded-full border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 text-xs">
<span class="material-symbols-outlined text-sm">info</span>
            Changes are logged to the audit trail
        </div>
</div>
</body></html>
